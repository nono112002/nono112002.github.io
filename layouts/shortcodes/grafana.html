<div class="grafana-embed" style="width:100%; overflow:hidden; border-radius:8px; margin:1.5rem 0;">
  <iframe
    src="{{ .Get "url" }}"
    width="100%"
    height="{{ .Get "height" | default "450" }}"
    frameborder="0"
    style="border: 1px solid #e5e7eb; border-radius: 8px;"
    allowfullscreen
  ></iframe>
</div>
