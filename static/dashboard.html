<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar Heat - ライブデータ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 4px;
      width: 100vw;
      height: 100vh;
    }
    .span2 { grid-column: 1 / -1; }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="grid">
    <iframe src="http://34.58.138.105:3000/d/solar-heat-main/solar-heat?viewPanel=1&kiosk&orgId=1"></iframe>
    <iframe src="http://34.58.138.105:3000/d/solar-heat-main/solar-heat?viewPanel=10&kiosk&orgId=1"></iframe>
    <iframe class="span2" src="http://34.58.138.105:3000/d/solar-heat-main/solar-heat?viewPanel=20&kiosk&orgId=1"></iframe>
  </div>
</body>
</html>
